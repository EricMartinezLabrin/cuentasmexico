version: '3.9'

services:
  web:
    build: .
    container_name: cuentasmexico_web
    command: >
      sh -c "chmod -R 755 /app/staticfiles /app/media &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 CuentasMexico.wsgi:application"
    ports:
      - '8000:8000'
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-cuentasmexico}
      DB_USER: ${DB_USER:-cuentas}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - cuentasmexico_network
    restart: unless-stopped

  scheduler:
    build: .
    container_name: cuentasmexico_scheduler
    command: >
      sh -c "while true; do
        now=$(date +%s);
        start_time=$(date -d \"$(date +%Y-%m-%d) ${WORKING_HOURS_START:-09:00}\" +%s);
        end_time=$(date -d \"$(date +%Y-%m-%d) ${WORKING_HOURS_END:-21:00}\" +%s);
        if [ $now -lt $start_time ]; then
          sleep $((start_time - now));
        elif [ $now -ge $end_time ]; then
          start_time=$(date -d \"tomorrow ${WORKING_HOURS_START:-09:00}\" +%s);
          sleep $((start_time - now));
        fi;
        python manage.py send_due_today_whatsapp;
        tomorrow_start=$(date -d \"tomorrow ${WORKING_HOURS_START:-09:00}\" +%s);
        now=$(date +%s);
        if [ $tomorrow_start -gt $now ]; then
          sleep $((tomorrow_start - now));
        else
          sleep 300;
        fi;
      done"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-cuentasmexico}
      DB_USER: ${DB_USER:-cuentas}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - .:/app
    depends_on:
      - web
    networks:
      - cuentasmexico_network
    restart: unless-stopped

  scheduler_due_5_days:
