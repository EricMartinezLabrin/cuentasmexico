version: '3.9'

services:
  web:
    build: .
    container_name: cuentasmexico_web_dev
    command: >
      sh -c "chmod -R 755 /app/staticfiles /app/media &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - '8000:8000'
    environment:
      DEBUG: 'True'
      SECRET_KEY: dev-secret-key-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: cuentasmexico
      DB_USER: luinmack
      DB_PASSWORD: Tarkan11.-
      DB_HOST: 187.136.94.242
      DB_PORT: 3306
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    restart: unless-stopped

  scheduler:
    build: .
    container_name: cuentasmexico_scheduler_dev
    command: >
      sh -c "while true; do
        python manage.py send_due_today_whatsapp;
        sleep 180;
      done"
    environment:
      DEBUG: 'True'
      SECRET_KEY: dev-secret-key-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: cuentasmexico
      DB_USER: luinmack
      DB_PASSWORD: Tarkan11.-
      DB_HOST: 187.136.94.242
      DB_PORT: 3306
    volumes:
      - .:/app
    depends_on:
      - web
    restart: unless-stopped

  scheduler_due_5_days:
    build: .
    container_name: cuentasmexico_scheduler_due_5_days_dev
    command: >
      sh -c "while true; do
        python manage.py send_due_in_5_days_whatsapp;
